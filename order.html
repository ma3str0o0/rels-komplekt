<!DOCTYPE html>
<html lang="ru">
<head>
  <script>(function(){var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.telegram.org; frame-src https://yandex.ru https://maps.yandex.ru; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Оформите заявку на поставку рельсовых материалов. Укажите позиции и данные предприятия — мы подготовим коммерческое предложение.">
  <title>Оформление заявки — Рельс-Комплект</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Рельс-Комплект">
  <meta property="og:title" content="Оформление заявки — Рельс-Комплект">
  <meta property="og:description" content="Оформите заявку на поставку рельсовых материалов. Укажите позиции и данные предприятия — мы подготовим коммерческое предложение.">
  <meta property="og:url" content="https://rels-komplekt.ru/order.html">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230369A1'/><text y='22' x='6' font-size='20' fill='white' font-family='sans-serif' font-weight='bold'>Р</text></svg>">

  <style>
    /* ── Стили, специфичные для страницы заявки ── */
    .order-table td,
    .order-table th {
      vertical-align: middle;
    }

    .order-row-name {
      font-weight: 600;
      color: var(--color-primary);
      min-width: 200px;
    }

    .order-totals td {
      background: #F1F5F9;
      font-weight: 700;
      padding-block: var(--space-md);
      border-top: 2px solid var(--color-border-dark);
    }

    .order-totals__label {
      color: var(--color-secondary);
      font-size: var(--font-size-sm);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .order-totals__qty,
    .order-totals__sum {
      color: var(--color-primary);
      font-size: var(--font-size-lg);
    }

    .order-qty-input {
      width: 70px;
      text-align: center;
      padding: 6px 8px;
    }

    .order-remove-btn {
      color: var(--color-text-muted);
      transition: color var(--transition-fast), background-color var(--transition-fast);
    }

    .order-remove-btn:hover {
      color: var(--color-error);
      background-color: #FEE2E2;
      border-color: #FEE2E2;
    }

    .order-note {
      display: block;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-sm);
      font-style: italic;
    }

    .order-actions {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-xl);
      flex-wrap: wrap;
    }

    /* Шапка страницы */
    .order-page-header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding-block: var(--space-md);
    }

    .order-page-header__body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      flex-wrap: wrap;
      margin-top: var(--space-xs);
    }

    .order-page-header__title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .order-page-header__count {
      font-size: var(--font-size-sm);
      background: var(--color-cta);
      color: #fff;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       ШАПКА
  ═══════════════════════════════════════════════════════════ -->
  <div id="header-placeholder"></div>

  <!-- ═══════════════════════════════════════════════════════════
       ГЛАВНЫЙ КОНТЕНТ
  ═══════════════════════════════════════════════════════════ -->
  <main id="main-content">

    <!-- Шапка страницы -->
    <div class="order-page-header">
      <div class="container">
        <nav class="breadcrumbs" aria-label="Хлебные крошки">
          <a href="index.html" class="breadcrumbs__item">Главная</a>
          <span class="breadcrumbs__sep" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
          <a href="catalog.html" class="breadcrumbs__item">Каталог</a>
          <span class="breadcrumbs__sep" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
          <span class="breadcrumbs__item active" aria-current="page">Моя заявка</span>
        </nav>
        <div class="order-page-header__body">
          <h1 class="order-page-header__title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            Моя заявка
          </h1>
          <a href="catalog.html" class="btn btn-secondary btn-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Вернуться в каталог
          </a>
        </div>
      </div>
    </div>

    <!-- Контент (таблица или пустое состояние) -->
    <div class="section section--sm">
      <div class="container">
        <div id="orderContent">
          <!-- Заполняется order.js -->
        </div>
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════════════════════
       СЕКЦИЯ "ОСТАЛИСЬ ВОПРОСЫ?"
  ═══════════════════════════════════════════════════════════ -->
  <section class="cta-contact" aria-label="Обратная связь">
    <div class="container">
      <div class="cta-contact__card">
        <h2 class="cta-contact__title">Остались вопросы?</h2>
        <p class="cta-contact__sub">Свяжитесь с нами — ответим в течение часа</p>
        <form class="cta-contact__form" novalidate>
          <div class="cta-contact__fields">
            <input class="input" type="text" name="name" placeholder="Ваше имя" required autocomplete="name">
            <input class="input" type="tel" name="phone" placeholder="+7 (___) ___-__-__" required autocomplete="tel">
          </div>
          <label class="form-consent">
            <input type="checkbox" name="consent">
            <span>Согласен(на) на <a href="privacy.html" target="_blank">обработку персональных данных</a></span>
          </label>
          <button class="btn btn-primary" type="submit">Перезвоните мне</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════
       ФУТЕР
  ═══════════════════════════════════════════════════════════ -->
  <div id="footer-placeholder"></div>

  <!-- МОДАЛЬНОЕ ОКНО ЗАЯВКИ -->
  <div class="modal-overlay" id="requestModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">Свяжитесь с нами</h2>
        <button class="modal__close" aria-label="Закрыть окно">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form class="modal__body" id="requestForm" novalidate>
        <div class="form-group">
          <label class="form-label form-label--required" for="req-name">Ваше имя</label>
          <input class="input" type="text" id="req-name" name="name" placeholder="Иванов Иван" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label form-label--required" for="req-phone">Телефон</label>
          <input class="input" type="tel" id="req-phone" name="phone" placeholder="+7 (___) ___-__-__" required autocomplete="tel">
        </div>
        <div class="form-group">
          <label class="form-label" for="req-message">Сообщение</label>
          <textarea class="textarea" id="req-message" name="message" rows="3" placeholder="Чем можем помочь?"></textarea>
        </div>
        <div class="modal__footer">
          <label class="form-consent">
            <input type="checkbox" name="consent">
            <span>Согласен(на) на <a href="privacy.html" target="_blank">обработку персональных данных</a></span>
          </label>
          <button class="btn btn-primary" type="submit" style="width:100%;">Отправить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/order.js"></script>
<script src="assets/js/tracker.js"></script>
</body>
</html>

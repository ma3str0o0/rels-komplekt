# 301-редиректы со старых URL Уралсофта на наши страницы.
#
# Базовый набор от 2026-04-27. Покрывает топ-категории и
# системные страницы. Полная карта (44 редиректа из админки
# Уралсофта + страницы товаров) добавляется отдельным промптом.
#
# Используется в /etc/nginx/sites-available/rels-komplekt.ru
# через include.
#
# URL-encoded русских названий категорий — точные значения
# из data/catalog.json (а не предполагаемые), чтобы фильтр
# в catalog.js (?cat=) сработал.

# ── Системные страницы ─────────────────────────────────────────
location = /feedback/         { return 301 /contacts.html; }
location = /feedback          { return 301 /contacts.html; }
location = /produkciya/       { return 301 /catalog.html; }
location = /produkciya        { return 301 /catalog.html; }
location = /privacy-policy/   { return 301 /privacy.html; }
location = /privacy-policy    { return 301 /privacy.html; }
location = /sitemap/          { return 301 /sitemap.xml; }

# ── Каталог — корень ───────────────────────────────────────────
location = /store/   { return 301 /catalog.html; }
location = /store    { return 301 /catalog.html; }

# ── Каталог — категории (точные значения category из catalog.json) ──
# Рельсы широкой колеи
location ^~ /store/relsy/ {
    return 301 "/catalog.html?cat=%D0%A0%D0%B5%D0%BB%D1%8C%D1%81%D1%8B%20%D1%88%D0%B8%D1%80%D0%BE%D0%BA%D0%BE%D0%B9%20%D0%BA%D0%BE%D0%BB%D0%B5%D0%B8";
}
# Рельсы крановые
location ^~ /store/relsy-kranovye/ {
    return 301 "/catalog.html?cat=%D0%A0%D0%B5%D0%BB%D1%8C%D1%81%D1%8B%20%D0%BA%D1%80%D0%B0%D0%BD%D0%BE%D0%B2%D1%8B%D0%B5";
}
# Рельсы узкоколейные (в catalog.json — "Рельсы узкоколейные", а не "Узкоколейные рельсы")
location ^~ /store/relsy-uzkoy-kolei/ {
    return 301 "/catalog.html?cat=%D0%A0%D0%B5%D0%BB%D1%8C%D1%81%D1%8B%20%D1%83%D0%B7%D0%BA%D0%BE%D0%BA%D0%BE%D0%BB%D0%B5%D0%B9%D0%BD%D1%8B%D0%B5";
}
# Шпалы деревянные
location ^~ /store/shpaly-derevyannye-propitannye/ {
    return 301 "/catalog.html?cat=%D0%A8%D0%BF%D0%B0%D0%BB%D1%8B%20%D0%B4%D0%B5%D1%80%D0%B5%D0%B2%D1%8F%D0%BD%D0%BD%D1%8B%D0%B5";
}
# Шпалы железобетонные
location ^~ /store/shpaly-zhelezobetonnye/ {
    return 301 "/catalog.html?cat=%D0%A8%D0%BF%D0%B0%D0%BB%D1%8B%20%D0%B6%D0%B5%D0%BB%D0%B5%D0%B7%D0%BE%D0%B1%D0%B5%D1%82%D0%BE%D0%BD%D0%BD%D1%8B%D0%B5";
}
# Крепеж железнодорожный (в catalog.json — Е, не Ё)
location ^~ /store/krepezh-zhd/ {
    return 301 "/catalog.html?cat=%D0%9A%D1%80%D0%B5%D0%BF%D0%B5%D0%B6%20%D0%B6%D0%B5%D0%BB%D0%B5%D0%B7%D0%BD%D0%BE%D0%B4%D0%BE%D1%80%D0%BE%D0%B6%D0%BD%D1%8B%D0%B9";
}
# Крановый крепеж (в catalog.json — Е, не Ё)
location ^~ /store/kranovyy-krepezh/ {
    return 301 "/catalog.html?cat=%D0%9A%D1%80%D0%B0%D0%BD%D0%BE%D0%B2%D1%8B%D0%B9%20%D0%BA%D1%80%D0%B5%D0%BF%D0%B5%D0%B6";
}
# Брус для стрелочного перевода (в catalog.json — полное название, не "Брус переводной")
location ^~ /store/brus-perevodnoy/ {
    return 301 "/catalog.html?cat=%D0%91%D1%80%D1%83%D1%81%20%D0%B4%D0%BB%D1%8F%20%D1%81%D1%82%D1%80%D0%B5%D0%BB%D0%BE%D1%87%D0%BD%D0%BE%D0%B3%D0%BE%20%D0%BF%D0%B5%D1%80%D0%B5%D0%B2%D0%BE%D0%B4%D0%B0";
}
# Международный стандарт DIN 536 — без cat-параметра, на корень каталога
location ^~ /store/mezhdunarodnyy-standart-rels-din-536/ {
    return 301 /catalog.html;
}

# ── Изображения старого сайта — Gone, не индексировать ─────────
# Картинки конкурента/Уралсофта нам не нужны.
location ^~ /uploadedFiles/ { return 410; }
location ^~ /img/k1_4/      { return 410; }

# ── Catch-all для непокрытых /store/* ──────────────────────────
# Должен быть ПОСЛЕДНИМ из /store/*-блоков.
location ^~ /store/ {
    return 301 /catalog.html;
}

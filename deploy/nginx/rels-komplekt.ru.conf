# ----------------------------------------------------------------
# rels-komplekt.ru  — публичный домен
#
# Создан 2026-04-27 для переезда с Уралсофта на наш VPS.
#
# HTTP only. SSL добавится отдельным промптом через
# certbot --nginx после смены A-записи в nic.ru на 202.148.53.107.
#
# Rate-limit zones объявлены в /etc/nginx/conf.d/rels-rate-limits.conf
# (api_notify, api_track, api_lead) — используются по имени.
# ----------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name rels-komplekt.ru www.rels-komplekt.ru;

    root /root/projects/rels-komplekt;
    charset utf-8;
    client_max_body_size 11m;

    # Логи отдельно — для мониторинга 404 после cutover
    access_log /var/log/nginx/rels-komplekt.ru.access.log;
    error_log  /var/log/nginx/rels-komplekt.ru.error.log;

    # ── ACME-challenge для Let's Encrypt ─────────────────────────
    # Webroot будет в .well-known/ внутри проекта (уже создана
    # 14 апреля). Альтернатива — отдельная директория, но эта
    # уже работает и сохраняется в git.
    location /.well-known/acme-challenge/ {
        root /root/projects/rels-komplekt;
        default_type "text/plain";
        try_files $uri =404;
    }

    # ── Блокируем служебные пути (точная копия из :8080-блока) ──
    location ~ ^/(proxy|\.git|data/vsp74_scrape|data/catalog_enriched|data/catalog_backup|data/catalog\.json\.bak|data/image_map|data/competitor|data/eshop|data/metrics|docs|tools|\.env|CLAUDE\.md|DEVLOG\.md|PROJECT_STATUS\.md) {
        return 403;
    }

    # ── Трекер аналитики → gunicorn ──────────────────────────────
    location /api/track {
        limit_req zone=api_track burst=20 nodelay;
        limit_req_status 429;
        proxy_pass          http://unix:/run/rels-notify/app.sock;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  10s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  10s;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ── CRM-заявки → gunicorn ────────────────────────────────────
    location /api/lead {
        limit_req zone=api_lead burst=2 nodelay;
        limit_req_status 429;
        proxy_pass          http://unix:/run/rels-notify/app.sock;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  15s;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ── Заявки с форм → gunicorn ─────────────────────────────────
    location /api/notify {
        limit_req zone=api_notify burst=3 nodelay;
        limit_req_status 429;
        proxy_pass          http://unix:/run/rels-notify/app.sock;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  65s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  65s;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ── JS/CSS/HTML/JSON — без кэша (как в :8080-блоке) ──────────
    location ~* \.(js|css|html|json)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        try_files $uri =404;
    }

    # ── Картинки/шрифты — кэш 7 дней ─────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # ── 301-редиректы со старых URL Уралсофта ────────────────────
    # Будут добавлены отдельным промптом (Promo 02) через include.
    include /etc/nginx/snippets/rels-redirects.conf;

    # ── Всё остальное ─────────────────────────────────────────────
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ =404;
    }
}

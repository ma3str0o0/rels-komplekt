# Rate limit zones для проекта Рельс-Комплект.
# Используется server-блоками rels-komplekt (внутренний :8080)
# и rels-komplekt.ru (публичный домен).
#
# Переехало из sites-enabled/rels-komplekt 2026-04-27.

# Заявки с форм (notify): 10 req/min с одного IP
limit_req_zone $binary_remote_addr zone=api_notify:10m rate=10r/m;

# Трекер аналитики: 120 событий/min с одного IP
limit_req_zone $binary_remote_addr zone=api_track:10m  rate=120r/m;

# CRM-заявки (lead): 3 req/min с одного IP
limit_req_zone $binary_remote_addr zone=api_lead:10m   rate=3r/m;
